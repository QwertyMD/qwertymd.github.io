<!DOCTYPE html>
<html>
<head>
  <title>Welcome</title>
  <link rel="shortcut icon" type="image/png" href="https://avatarfiles.alphacoders.com/152/152286.jpg">
  <style>
    body {
      background-color: #000721;
      background-image: url("https://www.transparenttextures.com/patterns/light-honeycomb-dark.png");
      color: #2a90b3;
      font-family: Arial, sans-serif;
      font-size: 18px;
      line-height: 1.5;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      text-align: center;
      position: relative;
      animation: fade-in 1s ease-out;
    }
    
    .profile-pic {
      width: 50px;
      height: 50px;
      margin-top: 20px;
      animation: fade-in 1s ease-out;
    }

    h1 {
      color: #2596be;
      font-size: 48px;
      margin-bottom: 20px;
      animation: scale-in 1s ease-out;
    }

    .p1 {
      color: #25a5be;
      font-size: 24px;
      margin-bottom: 20px;
      font-style: italic;
      font-weight: bold;
      animation: scale-in 1s ease-out;
    }

    .p2 {
      color: #2587be;
      font-size: 24px;
      margin-bottom: 40px;
      font-style: italic;
      animation: slide-in 1s ease-out;
    }

    .video-container {
      position: relative;
      padding-bottom: 28.125%;
      padding-top: 30px;
      height: 0;
      overflow: hidden;
      margin-top: 40px;
      animation: fade-in 1s ease-out;
    }

    .video-container img {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      right: 0;
      margin: auto;
    }

    .contact {
      position: absolute;
      top: 20px;
      animation: fade-in 1s ease-out;
    }

    .contact-left {
      left: 20px;
    }

    .contact-right {
      right: 20px;
    }

    .contact a {
      display: inline-block;
      margin-top: 10px;
      margin-left: 10px;
      padding: 10px;
      border: 1px solid #50c0e9;
      border-radius: 5px;
      transition: all 0.3s ease;
      text-decoration: none;
      color: #50c0e9;
    }

    .contact a:first-child {
      margin-left: 0;
    }

    .contact a:hover {
      transform: scale(1.2);
    }

    @keyframes fade-in {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @keyframes scale-in {
      from {
        transform: scale(0);
      }
      to {
        transform: scale(1);
      }
    }

    @keyframes slide-in {
      from {
        transform: translateY(100%);
      }
      to {
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="contact contact-left">
      <a class="link" href="https://www.facebook.com/profile.php?id=100004187504968" target="_blank">My Facebook</a>
    </div>
    <div class="contact contact-right">
      <a class="link" href="https://github.com/QwertyMD" target="_blank">My Github</a>
    </div>
    <div class="profile-pic">
      <img src="https://avatarfiles.alphacoders.com/152/152286.jpg" alt="Profile Picture">
    </div>
    <h1>Hey There 👋</h1>
    <h1>I'm Aaryan Dhakal</h1>
    <p class="p1">Currently a high school student with deep interest in Computers.</p>
    <p class="p2">"One day... or DAY 1. You make the decision." -Someone</p>
    <div class="video-container">
      <img src="https://media.tenor.com/x8v1oNUOmg4AAAAC/rickroll-roll.gif" alt="Rickroll GIF">
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Welcome</title>
  <link rel="shortcut icon" type="image/png" href="https://avatarfiles.alphacoders.com/152/152286.jpg">
  <style>
    body {
      background-color: #000721;
      background-image: url("https://www.transparenttextures.com/patterns/light-honeycomb-dark.png");
      color: #2a90b3;
      font-family: Arial, sans-serif;
      font-size: 18px;
      line-height: 1.5;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      text-align: center;
      position: relative;
      animation: fade-in 1s ease-out;
    }

    h1 {
      color: #2596be;
      font-size: 48px;
      margin-bottom: 20px;
      animation: scale-in 1s ease-out;
    }

    .quote {
      color: #2587be;
      font-size: 24px;
      margin-bottom: 40px;
      font-style: italic;
      animation: slide-in 1s ease-out;
    }

    .btn-click-me {
      background-color: #50c0e9;
      border: none;
      color: white;
      padding: 15px 32px;
      text-align: center;
      text-decoration: none;
      display: inline-block;
      font-size: 16px;
      margin-top: 20px;
      cursor: pointer;
      border-radius: 5px;
      transition: all 0.3s ease;
    }

    .btn-click-me:hover {
      background-color: #2596be;
    }

    .popup {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: #fff;
      padding: 20px;
      border-radius: 5px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
      z-index: 999;
    }

    .popup.active {
      display: block;
    }

    .close {
      position: absolute;
      top: 10px;
      right: 10px;
      cursor: pointer;
    }

    @keyframes fade-in {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @keyframes scale-in {
      from {
        transform: scale(0);
      }
      to {
        transform: scale(1);
      }
    }

    @keyframes slide-in {
      from {
        transform: translateY(100%);
      }
      to {
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Hey There 👋</h1>
    <p class="quote">"If you're always trying to be normal you'll never know how amazing you can be."</p>
    <button class="btn-click-me" onclick="togglePopup()">Click Me</button>
    <div id="popup" class="popup">
      <span class="close" onclick="togglePopup()">X</span>
      <p>Hello world</p>
    </div>
  </div>

  <script>
    function togglePopup() {
      var popup = document.getElementById("popup");
      popup.classList.toggle("active");
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Welcome</title>
  <link rel="shortcut icon" type="image/png" href="https://avatarfiles.alphacoders.com/152/152286.jpg">
  <style>
    body {
      background-color: #2e428c;
      background-image: url("https://www.transparenttextures.com/patterns/gray-floral.png");
      color: #2a90b3;
      font-family: Arial, sans-serif;
      font-size: 18px;
      line-height: 1.5;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      text-align: center;
      position: relative;
      animation: fade-in 1s ease-out;
    }

    h1 {
      color: #2596be;
      font-size: 48px;
      margin-bottom: 20px;
      animation: scale-in 1s ease-out;
    }

    .quote {
      color: #2587be;
      font-size: 30px;
      margin-bottom: 40px;
      font-style: italic;
      animation: slide-in 1s ease-out;
      position: relative;
    }

    .btn-click-me {
      background-color: #50c0e9;
      border: none;
      color: white;
      padding: 15px 32px;
      text-align: center;
      text-decoration: none;
      display: inline-block;
      font-size: 20px;
      margin-top: 20px;
      cursor: pointer;
      border-radius: 25px;
      transition: all 0.3s ease;
    }

    .btn-click-me:hover {
      background-color: #2596be;
      transform: scale(1.1);
    }

    .popup {
      display: none;
      position: absolute;
      top: calc(100% + 20px);
      left: 50%;
      transform: translateX(-50%);
      background-color: #ffffff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
      z-index: 999;
      font-size: 24px;
      animation: fade-in 0.5s ease-in-out;
    }

    .popup.active {
      display: block;
    }

    .close {
      position: absolute;
      top: 10px;
      right: 10px;
      cursor: pointer;
      font-size: 20px;
    }

    .contact {
      position: absolute;
      top: 20px;
    }

    .contact-left {
      left: 20px;
    }

    .contact-right {
      right: 20px;
    }

    .contact a {
      display: inline-block;
      margin-top: 10px;
      margin-left: 10px;
      padding: 10px;
      border: 1px solid #50c0e9;
      border-radius: 5px;
      transition: all 0.3s ease;
      text-decoration: none;
      color: #50c0e9;
    }

    .contact a:first-child {
      margin-left: 0;
    }

    .contact a:hover {
      transform: scale(1.2);
    }

    @keyframes fade-in {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @keyframes scale-in {
      from {
        transform: scale(0);
      }
      to {
        transform: scale(1);
      }
    }

    @keyframes slide-in {
      from {
        transform: translateY(100%);
      }
      to {
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="contact contact-left">
      <a class="link" href="https://www.facebook.com/profile.php?id=100004187504968" target="_blank">Facebook</a>
    </div>
    <div class="contact contact-right">
      <a class="link" href="https://github.com/QwertyMD" target="_blank">Github</a>
    </div>
    <h1>Hey There 👋</h1>
    <p class="quote">"If you're always trying to be normal you'll never know how amazing you can be."</p>
    <button class="btn-click-me" onclick="togglePopup()">Click Me</button>
    <div id="popup" class="popup">
      <span class="close" onclick="togglePopup()">X</span>
      <p>All I ever wanted to say was:</p>
    </div>
  </div>

  <script>
    function togglePopup() {
      var popup = document.getElementById("popup");
      popup.classList.toggle("active");
    }
  </script>
</body>
</html>
